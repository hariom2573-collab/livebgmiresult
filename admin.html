<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BGMI Premium Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui;}
body{
  height:100vh;
  display:flex;
  flex-direction:column;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:#fff;
}
h2{
  text-align:center;
  padding:10px;
  font-size:20px;
  background:linear-gradient(90deg,#00f5ff,#ff00c8,#ffd86b);
  -webkit-background-clip:text;
  color:transparent;
  font-weight:900;
}
#adminWrap{
  flex:1;
  overflow-y:auto;
  padding:10px;
}
.card{
  backdrop-filter:blur(14px);
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  padding:10px;
  margin-bottom:10px;
}
.slotTitle{
  font-weight:800;
  margin-bottom:6px;
  font-size:14px;
}
.row{
  display:flex;
  gap:6px;
}
input,select{
  padding:8px;
  border:none;
  border-radius:10px;
  width:100%;
  outline:none;
  font-size:13px;
  font-weight:600;
}
input{
  background:#0e1122;
  color:#00f5ff;
}
select{
  background:#11152b;
  color:#fff;
}
button{
  width:100%;
  padding:14px;
  border:none;
  font-weight:900;
  font-size:15px;
  cursor:pointer;
  background:linear-gradient(135deg,#00f5ff,#ff00c8,#ffd86b);
  color:#000;
  margin-top:5px;
}
.statusAvailable{border-left:5px solid #00ff88;}
.statusReserved{border-left:5px solid #ff2e63;}
</style>
</head>
<body>

<h2>🎮 BGMI LIVE SLOT ADMIN</h2>

<div id="adminWrap"></div>
<button id="pushBtn">🚀 UPDATE LIVE</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyDsJUtZdIXcsB0w_2MQhMBXxIgbI3ijOvg",
  authDomain:"incoinpaysliveearning.firebaseapp.com",
  databaseURL:"https://incoinpaysliveearning-default-rtdb.firebaseio.com",
  projectId:"incoinpaysliveearning"
});

var db=firebase.database();
var wrap=document.getElementById("adminWrap");

const TOTAL_SLOTS=25;
var slots=[];

/* Create default slots */
function createDefaultSlots(){
  slots=[];
  for(let i=1;i<=TOTAL_SLOTS;i++){
    slots.push({
      slot:"Slot "+i,
      name:"",
      status:"Available"
    });
  }
}

/* Load bookings from register page data */
function loadFromDatabase(){

  createDefaultSlots();

  db.ref("slots").once("value").then(function(snap){

    if(snap.exists()){

      const data=Object.values(snap.val());

      data.forEach(function(b,i){
        if(i<TOTAL_SLOTS){
          slots[i].name=b.name || "";
          slots[i].status="Reserved";
        }
      });

    }

    renderAdmin();
  });
}

/* Render Admin UI */
function renderAdmin(){

  wrap.innerHTML="";

  slots.forEach(function(s,i){

    var d=document.createElement("div");
    d.className="card";

    if(s.status==="Available") d.classList.add("statusAvailable");
    if(s.status==="Reserved") d.classList.add("statusReserved");

    d.innerHTML=
      "<div class='slotTitle'>"+s.slot+"</div>"+
      "<div class='row'>"+
      "<input value='"+s.name+"' class='nameInput' placeholder='Player Name'>"+
      "<select class='statusSel'>"+
      "<option value='Available' "+(s.status==="Available"?"selected":"")+">Available</option>"+
      "<option value='Reserved' "+(s.status==="Reserved"?"selected":"")+">Reserved</option>"+
      "</select>"+
      "</div>";

    wrap.appendChild(d);

    d.querySelector(".nameInput").oninput=function(e){
      slots[i].name=e.target.value.toUpperCase();
    };

    d.querySelector(".statusSel").onchange=function(e){
      slots[i].status=e.target.value;
      renderAdmin();
    };

  });
}

/* Push updated manual slots */
document.getElementById("pushBtn").onclick=function(){

  var finalData={};

  slots.forEach(function(s,i){
    if(s.status==="Reserved"){
      finalData["slot"+(i+1)]={
        name:s.name || "PLAYER",
        slot:s.slot,
        status:"Reserved"
      };
    }
  });

  db.ref("slots").set(finalData)
  .then(()=>alert("✅ Live Updated Successfully"))
  .catch(err=>alert("❌ "+err.message));
};

/* Initial Load */
loadFromDatabase();
</script>

</body>
</html>
