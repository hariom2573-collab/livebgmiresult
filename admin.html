<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BGMI Premium Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui;}
body{
  height:100vh;
  display:flex;
  flex-direction:column;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:#fff;
}
h2{
  text-align:center;
  padding:10px 10px 5px;
  font-size:20px;
  background:linear-gradient(90deg,#00f5ff,#ff00c8,#ffd86b);
  -webkit-background-clip:text;
  color:transparent;
  font-weight:900;
}
#adminWrap{
  flex:1;
  overflow-y:auto;
  padding:10px;
}
.card{
  backdrop-filter:blur(14px);
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  padding:10px;
  margin-bottom:10px;
  transition:0.3s ease;
}
.slotTitle{
  font-weight:800;
  margin-bottom:6px;
  font-size:14px;
}
.row{
  display:flex;
  gap:6px;
}
input,select{
  padding:8px;
  border:none;
  border-radius:10px;
  width:100%;
  outline:none;
  font-size:13px;
  font-weight:600;
}
input{
  background:#0e1122;
  color:#00f5ff;
}
select{
  background:#11152b;
  color:#fff;
}
button{
  width:100%;
  padding:14px;
  border:none;
  font-weight:900;
  font-size:15px;
  cursor:pointer;
  background:linear-gradient(135deg,#00f5ff,#ff00c8,#ffd86b);
  color:#000;
  margin-top:5px;
}
#upiBtn{
  margin:10px 10px 0 10px;
  border-radius:12px;
  background:linear-gradient(135deg,#ffd86b,#ff00c8,#00f5ff);
  color:#000;
}
.statusAvailable{
  border-left:5px solid #00ff88;
}
.statusReserved{
  border-left:5px solid #ff2e63;
}
</style>
</head>
<body>

<h2>🎮 BGMI LIVE SLOT ADMIN</h2>

<!-- UPI Button -->
<button id="upiBtn">💳 Update Tournament UPI</button>

<div id="adminWrap"></div>
<button id="pushBtn">🚀 PUSH LIVE</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyDsJUtZdIXcsB0w_2MQhMBXxIgbI3ijOvg",
  authDomain: "incoinpaysliveearning.firebaseapp.com",
  databaseURL: "https://incoinpaysliveearning-default-rtdb.firebaseio.com",
  projectId: "incoinpaysliveearning",
  storageBucket: "incoinpaysliveearning.appspot.com",
  messagingSenderId: "971873814750",
  appId: "1:971873814750:web:7418c7da119e4725ed9a4f"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

var slots = [];
for(let i=1;i<=20;i++){
  slots.push({slot:"Slot "+i,name:"AVAILABLE",status:"Available"});
}

var wrap=document.getElementById("adminWrap");

function renderAdmin(){
  wrap.innerHTML="";
  slots.forEach(function(s,i){
    var d=document.createElement("div");
    d.className="card";
    if(s.status==="Available") d.classList.add("statusAvailable");
    if(s.status==="Reserved") d.classList.add("statusReserved");

    d.innerHTML=
      "<div class='slotTitle'>"+s.slot+"</div>"+
      "<div class='row'>"+
      "<input value='"+s.name+"' class='nameInput'>"+
      "<select class='statusSel'>"+
      "<option value='Available' "+(s.status==="Available"?"selected":"")+">Available</option>"+
      "<option value='Reserved' "+(s.status==="Reserved"?"selected":"")+">Reserved</option>"+
      "</select>"+
      "</div>";

    wrap.appendChild(d);

    d.querySelector(".nameInput").oninput=function(e){
      slots[i].name=e.target.value.toUpperCase();
      e.target.value=e.target.value.toUpperCase();
    };
    d.querySelector(".statusSel").onchange=function(e){
      slots[i].status=e.target.value;
      renderAdmin();
    };
  });
}

// Load slots from Firebase
db.ref("slots").once("value").then(function(snap){
  if(snap.exists()){
    slots=snap.val();
  }
  renderAdmin();
});

// Push updated slots to Firebase
document.getElementById("pushBtn").onclick=function(){
  db.ref("slots").set(slots)
  .then(()=>alert("✅ Updated Successfully!"))
  .catch(err=>alert("❌ "+err.message));
};

// Open admin-upi.html when UPI button clicked
document.getElementById("upiBtn").onclick=function(){
  window.open("admin-upi.html","_blank");
};
</script>

</body>
</html>
