<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BGMI Admin Dashboard</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  height:100vh;
  background:radial-gradient(circle at top,#1a1f35,#0c0f18 70%);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ===== MOBILE CONTAINER ===== */

.wrapper{
  width:100%;
  max-width:420px;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:20px;
}

/* ===== LOGIN ===== */

.login-box{
  background:#111827;
  padding:25px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 0 25px rgba(0,0,0,.6);
}

.login-box h2{
  color:#FFD700;
  margin-bottom:15px;
}

.input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#1f2937;
  color:#fff;
  margin-top:12px;
}

.btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:14px;
  font-weight:800;
  cursor:pointer;
  margin-top:15px;
  font-size:15px;
}

/* ===== DASHBOARD ===== */

.dashboard{
  display:none;
  flex-direction:column;
  gap:15px;
}

.header{
  font-size:20px;
  font-weight:900;
  text-align:center;
  background:linear-gradient(90deg,#FFD700,#ff9f00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.card{
  background:#111827;
  padding:15px;
  border-radius:16px;
  border:1px solid rgba(255,215,0,.3);
}

.counter{
  font-size:24px;
  font-weight:900;
  color:#22f5c3;
  text-align:center;
  margin-top:5px;
}

select{
  width:100%;
  padding:10px;
  border-radius:10px;
  background:#1f2937;
  color:#fff;
  border:none;
  margin-top:8px;
}

.slot-btn{
  background:linear-gradient(90deg,#22c55e,#16a34a);
  color:#fff;
}

.confirm-btn{
  background:linear-gradient(90deg,#f97316,#f59e0b);
  color:#fff;
}

.logout-btn{
  background:#ef4444;
  color:#fff;
}
</style>
</head>

<body>

<div class="wrapper">

  <!-- LOGIN -->
  <div class="login-box" id="loginBox">
    <h2>ADMIN LOGIN</h2>
    <input type="password" id="adminPass" class="input" placeholder="Enter Password">
    <button class="btn" style="background:linear-gradient(90deg,#ff9f00,#FFD700);" onclick="login()">Login</button>
    <div id="loginMsg"></div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">

    <div class="header">BGMI ADMIN PANEL</div>

    <div class="card">
      <div>Total Bookings</div>
      <div class="counter" id="totalCount">0</div>
    </div>

    <div class="card">
      <div>Select Match</div>
      <select id="matchSelect">
        <option value="Room 1 • 12:30 PM">Room 1 • 12:30 PM</option>
        <option value="Room 2 • 8:00 PM">Room 2 • 8:00 PM</option>
      </select>
    </div>

    <button class="btn slot-btn" onclick="goSlots()">📋 Slot List</button>
    <button class="btn confirm-btn" onclick="goConfirm()">✅ Confirm Booking</button>

    <button class="btn logout-btn" onclick="logout()">Logout</button>

  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyDsJUtZdIXcsB0w_2MQhMBXxIgbI3ijOvg",
authDomain:"incoinpaysliveearning.firebaseapp.com",
databaseURL:"https://incoinpaysliveearning-default-rtdb.firebaseio.com",
projectId:"incoinpaysliveearning"
});

const db=firebase.database();
const ADMIN_PASSWORD="bgmi@123";

/* LOGIN */
function login(){
let pass=document.getElementById("adminPass").value;

if(pass===ADMIN_PASSWORD){
document.getElementById("loginBox").style.display="none";
document.getElementById("dashboard").style.display="flex";
loadCounter();
}else{
document.getElementById("loginMsg").innerHTML="<span style='color:red'>Wrong Password</span>";
}
}

function logout(){
location.reload();
}

/* LIVE COUNTER */
function loadCounter(){
db.ref("bookings").on("value",snap=>{
let count=0;
if(snap.exists()){
snap.forEach(()=>{count++;});
}
document.getElementById("totalCount").innerText=count;
});
}

/* BUTTON NAVIGATION */

function goSlots(){
window.location.href="admin-book.html";
}

function goConfirm(){
window.location.href="admin-slot.html";
}
</script>

</body>
</html>
