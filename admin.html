<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BGMI Admin • Login</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#0A0A0C;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#121421;
  padding:25px;
  border-radius:16px;
  width:100%;
  max-width:400px;
  box-shadow:0 6px 20px rgba(0,0,0,.5);
}

h2{
  color:#FFD700;
  text-align:center;
  margin-bottom:20px;
}

.input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-bottom:12px;
  font-size:16px;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  font-weight:bold;
  background:#FFD700;
  color:#000;
  cursor:pointer;
  font-size:16px;
}

.note{
  text-align:center;
  font-size:13px;
  margin-top:10px;
}

.err{color:#ff6b6b;}
</style>
</head>
<body>

<div class="card">
  <h2>Admin Login</h2>

  <input type="email" id="email" class="input" placeholder="Email"/>
  <input type="password" id="password" class="input" placeholder="Password"/>

  <button class="btn" onclick="loginAdmin()">Login</button>
  <div id="loginMsg" class="note"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

<script>
// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDsJUtZdIXcsB0w_2MQhMBXxIgbI3ijOvg",
  authDomain: "incoinpaysliveearning.firebaseapp.com",
  databaseURL: "https://incoinpaysliveearning-default-rtdb.firebaseio.com",
  projectId: "incoinpaysliveearning",
  storageBucket: "incoinpaysliveearning.appspot.com",
  messagingSenderId: "971873814750",
  appId: "1:971873814750:web:7418c7da119e4725ed9a4f"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// 🔥 YOUR ADMIN UID
const ADMIN_UID = "VIAP56vYwndWPhJxktn0lRPTWnS2";


// 🔐 LOGIN FUNCTION
async function loginAdmin(){

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const loginMsg = document.getElementById('loginMsg');
  loginMsg.innerHTML = '';

  if(!email || !password){
    loginMsg.innerHTML = "<span class='err'>❌ Enter email & password</span>";
    return;
  }

  try{
    const userCredential = await auth.signInWithEmailAndPassword(email,password);
    const user = userCredential.user;

    // ✅ ADMIN UID CHECK
    if(user.uid === ADMIN_UID){

      // 🔥 REDIRECT TO DASHBOARD
      window.location.href = "admin-dashboard.html";

    }else{

      loginMsg.innerHTML = "<span class='err'>❌ You are not Admin!</span>";
      auth.signOut();

    }

  }catch(err){
    loginMsg.innerHTML = "<span class='err'>❌ " + err.message + "</span>";
  }
}
</script>

</body>
</html>
