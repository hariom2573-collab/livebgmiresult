<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BGMI Admin Panel – Live Slots</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui;}
body{background:#0a0a12;color:#fff;padding:12px;}
h2{color:#00f5ff;margin:6px 0;}
.card{background:#121226;border-radius:14px;padding:10px;margin-bottom:10px;}
.row{display:flex;gap:8px;margin-top:6px;}
input,select,button{padding:10px;border-radius:10px;border:none;width:100%;}
button{
  background:linear-gradient(135deg,#7b3fe4,#00f5ff,#ffd86b);
  font-weight:900;color:#000;cursor:pointer;
}
</style>
</head>
<body>

<h2>🎮 BGMI Live Slot Admin</h2>
<div id="adminWrap"></div>
<button id="pushBtn">🚀 Push Live</button>

<!-- Firebase 8.10.0 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

// FIREBASE CONFIG
var firebaseConfig = {
  apiKey: "AIzaSyDsJUtZdIXcsB0w_2MQhMBXxIgbI3ijOvg",
  authDomain: "incoinpaysliveearning.firebaseapp.com",
  databaseURL: "https://incoinpaysliveearning-default-rtdb.firebaseio.com",
  projectId: "incoinpaysliveearning",
  storageBucket: "incoinpaysliveearning.appspot.com",
  messagingSenderId: "971873814750",
  appId: "1:971873814750:web:7418c7da119e4725ed9a4f"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// DEFAULT SLOTS
var defaultSlots = [
  {slot:"Slot 1", name:"Big Bull", status:"Reserved"},
  {slot:"Slot 2", name:"ZIA ESPORTS", status:""},
  {slot:"Slot 3", name:"PHRM", status:""},
  {slot:"Slot 4", name:"Angry.eSports", status:""},
  {slot:"Slot 5", name:"DELTIN ESPORTS", status:""},
  {slot:"Slot 6", name:"AVAILABLE", status:""},
  {slot:"Slot 7", name:"AVAILABLE", status:""},
  {slot:"Slot 8", name:"AVAILABLE", status:""},
  {slot:"Slot 9", name:"AVAILABLE", status:""},
  {slot:"Slot 10", name:"AVAILABLE", status:""}
];

var slots = defaultSlots.slice();
var wrap = document.getElementById("adminWrap");

// RENDER
function renderAdmin(){
  wrap.innerHTML="";

  slots.forEach(function(s,i){
    var d=document.createElement("div");
    d.className="card";

    d.innerHTML=
      "<b>"+s.slot+"</b>"+
      "<div class='row'>"+
      "<input value='"+s.name+"' class='nameInput'>"+
      "<select class='statusSel'>"+
      "<option value='Available' "+(s.status==="Available"?"selected":"")+">Available</option>"+
      "<option value='Reserved' "+(s.status==="Reserved"?"selected":"")+">Reserved</option>"+
      "<option value='' "+(s.status===""?"selected":"")+">Empty</option>"+
      "</select>"+
      "</div>";

    wrap.appendChild(d);

    d.querySelector(".nameInput").oninput=function(e){
      slots[i].name = e.target.value.toUpperCase();
      e.target.value = e.target.value.toUpperCase();
    };

    d.querySelector(".statusSel").onchange=function(e){
      slots[i].status = e.target.value;
    };
  });
}

// LOAD ONCE
db.ref("slots").once("value").then(function(snap){
  if(snap.exists()){
    var data = snap.val();
    if(Array.isArray(data)){
      slots = data;
    }
  }
  renderAdmin();
});

// SAFE PUSH (Indexed Update)
document.getElementById("pushBtn").onclick=function(){

  var updates = {};

  slots.forEach(function(slot,index){
    updates["slots/"+index] = slot;
  });

  db.ref().update(updates)
    .then(function(){
      alert("✅ Slots pushed live successfully!");
    })
    .catch(function(error){
      alert("❌ Error: " + error.message);
    });

};

</script>
</body>
</html>
