<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BGMI VIP Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui;}
body{
  background:#0a0a12;
  color:#fff;
  display:flex;
  flex-direction:column;
  min-height:100vh;
  overflow-x:hidden;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  padding:12px;
}
.menuBtn{
  font-size:22px;
  cursor:pointer;
  margin-right:10px;
}
h2{
  flex:1;
  text-align:center;
  font-size:18px;
  background:linear-gradient(90deg,#00f5ff,#ff00c8,#ffd86b);
  -webkit-background-clip:text;
  color:transparent;
  font-weight:900;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:240px;
  height:100%;
  background:#11152b;
  padding:20px;
  transition:0.3s;
  z-index:1000;
}
.sidebar.active{ left:0; }
.sidebar h3{ margin-bottom:20px;color:#00f5ff; }
.logoutBtn{
  padding:12px;
  background:#ff2e63;
  border:none;
  border-radius:10px;
  color:#fff;
  font-weight:700;
  cursor:pointer;
  width:100%;
}

/* OVERLAY */
.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  opacity:0;
  visibility:hidden;
  transition:0.3s;
  z-index:900;
}
.overlay.active{
  opacity:1;
  visibility:visible;
}

#adminWrap{
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  margin-bottom:10px;
}

.slotTitle{
  font-weight:800;
  margin-bottom:6px;
  font-size:14px;
}

.row{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

input,select{
  padding:10px;
  border:none;
  border-radius:10px;
  width:100%;
  outline:none;
  font-size:14px;
  font-weight:600;
}

input{ background:#0e1122;color:#00f5ff; }
select{ background:#11152b;color:#fff; }

.statusAvailable{border-left:5px solid #00ff88;}
.statusReserved{border-left:5px solid #ff2e63;}

#pushBtn{
  width:100%;
  padding:16px;
  border:none;
  font-weight:900;
  font-size:16px;
  cursor:pointer;
  background:linear-gradient(135deg,#00f5ff,#ff00c8,#ffd86b);
  color:#000;
  position:fixed;
  bottom:0;
  left:0;
  right:0;
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <h3>Admin Menu</h3>
  <button class="logoutBtn" onclick="logout()">🚪 Logout</button>
</div>

<div class="overlay" id="overlay"></div>

<!-- HEADER -->
<div class="header">
  <div class="menuBtn" onclick="openMenu()">☰</div>
  <h2>🎮 BGMI LIVE SLOT ADMIN</h2>
</div>

<div id="adminWrap"></div>
<button id="pushBtn">🚀 PUSH TO LIVE</button>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyDsJUtZdIXcsB0w_2MQhMBXxIgbI3ijOvg",
  authDomain:"incoinpaysliveearning.firebaseapp.com",
  databaseURL:"https://incoinpaysliveearning-default-rtdb.firebaseio.com",
  projectId:"incoinpaysliveearning"
});

const db = firebase.database();
const wrap = document.getElementById("adminWrap");
const TOTAL_SLOTS = 25;
let slots = [];

/* LOGIN CHECK */
firebase.auth().onAuthStateChanged(function(user){
  if(!user){
    window.location.href="admin-login.html";
  }else{
    loadFromDatabase();
  }
});

/* SIDEBAR */
const sidebar=document.getElementById("sidebar");
const overlay=document.getElementById("overlay");

function openMenu(){
  sidebar.classList.add("active");
  overlay.classList.add("active");
}
function closeMenu(){
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
}
overlay.addEventListener("click",closeMenu);

/* LOGOUT */
function logout(){
  firebase.auth().signOut().then(()=>{
    window.location.href="admin-login.html";
  });
}

/* SLOT SYSTEM */
function createDefaultSlots(){
  slots=[];
  for(let i=1;i<=TOTAL_SLOTS;i++){
    slots.push({slot:"Slot "+i,name:"",status:"Available"});
  }
}

function loadFromDatabase(){
  createDefaultSlots();
  db.ref("slots").once("value").then(snap=>{
    if(snap.exists()){
      const data=snap.val();
      for(let i=1;i<=TOTAL_SLOTS;i++){
        const key="Slot "+i;
        if(data[key]){
          slots[i-1].name=data[key].name||"";
          slots[i-1].status=data[key].status||"Available";
        }
      }
    }
    renderAdmin();
  });
}

function renderAdmin(){
  wrap.innerHTML="";
  slots.forEach((s,i)=>{
    const d=document.createElement("div");
    d.className="card "+(s.status==="Available"?"statusAvailable":"statusReserved");
    d.innerHTML=`
      <div class='slotTitle'>${s.slot}</div>
      <div class='row'>
        <input value='${s.name}' class='nameInput' placeholder='Player Name'>
        <select class='statusSel'>
          <option value='Available' ${s.status==="Available"?"selected":""}>Available</option>
          <option value='Reserved' ${s.status==="Reserved"?"selected":""}>Reserved</option>
        </select>
      </div>`;
    wrap.appendChild(d);

    d.querySelector(".nameInput").oninput=e=>slots[i].name=e.target.value.toUpperCase();
    d.querySelector(".statusSel").onchange=e=>{
      slots[i].status=e.target.value;
      renderAdmin();
    }
  });
}

/* PUSH UPDATE (FIXED - NO PERMISSION ERROR) */
document.getElementById("pushBtn").onclick=()=>{

  const updates={};

  slots.forEach((s,i)=>{
    updates["slots/Slot "+(i+1)]={
      slot:s.slot,
      name:s.name||"PLAYER",
      status:s.status
    };
  });

  db.ref().update(updates)
    .then(()=>alert("✅ Live Updated Successfully"))
    .catch(err=>alert("❌ "+err.message));
};
</script>

</body>
</html>
