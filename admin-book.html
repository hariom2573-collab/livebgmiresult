<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BGMI VIP Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui;}
body{
  background:#0a0a12;
  color:#fff;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}
h2{
  text-align:center;
  padding:12px;
  font-size:20px;
  color:#00f5ff;
  background:linear-gradient(90deg,#00f5ff,#ff00c8,#ffd86b);
  -webkit-background-clip:text;
  color:transparent;
  font-weight:900;
}
#adminWrap{
  flex:1;
  overflow-y:auto;
  padding:10px;
}
.card{
  background:rgba(255,255,255,0.05);
  padding:10px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.1);
  margin-bottom:10px;
}
.slotTitle{
  font-weight:800;
  margin-bottom:6px;
  font-size:14px;
}
.row{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}
input,select{
  padding:10px;
  border:none;
  border-radius:10px;
  width:100%;
  outline:none;
  font-size:14px;
  font-weight:600;
}
input{
  background:#0e1122;
  color:#00f5ff;
}
select{
  background:#11152b;
  color:#fff;
}
button{
  width:100%;
  padding:16px;
  border:none;
  font-weight:900;
  font-size:16px;
  cursor:pointer;
  background:linear-gradient(135deg,#00f5ff,#ff00c8,#ffd86b);
  color:#000;
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  z-index:100;
  border-radius:0;
}
.statusAvailable{border-left:5px solid #00ff88;}
.statusReserved{border-left:5px solid #ff2e63;}

/* Scrollbar for mobile */
#adminWrap::-webkit-scrollbar{
  width:6px;
}
#adminWrap::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,0.2);
  border-radius:3px;
}
#adminWrap::-webkit-scrollbar-track{
  background:transparent;
}

/* Responsive adjustments */
@media(max-width:400px){
  input, select{font-size:12px;padding:8px;}
  .slotTitle{font-size:13px;}
  button{font-size:14px;padding:14px;}
}
</style>
</head>
<body>

<h2>🎮 BGMI LIVE SLOT ADMIN</h2>
<div id="adminWrap"></div>
<button id="pushBtn">🚀 PUSH TO LIVE</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyDsJUtZdIXcsB0w_2MQhMBXxIgbI3ijOvg",
  authDomain:"incoinpaysliveearning.firebaseapp.com",
  databaseURL:"https://incoinpaysliveearning-default-rtdb.firebaseio.com",
  projectId:"incoinpaysliveearning"
});

const db = firebase.database();
const wrap = document.getElementById("adminWrap");
const TOTAL_SLOTS = 25;
let slots = [];

// Create default slots
function createDefaultSlots(){
  slots=[];
  for(let i=1;i<=TOTAL_SLOTS;i++){
    slots.push({slot:"Slot "+i,name:"",status:"Available"});
  }
}

// Load slots from Firebase
function loadFromDatabase(){
  createDefaultSlots();
  db.ref("slots").once("value").then(snap=>{
    if(snap.exists()){
      const data = snap.val();
      for(let i=1;i<=TOTAL_SLOTS;i++){
        const sKey = "Slot "+i;
        if(data[sKey]){
          slots[i-1].name = data[sKey].name || "";
          slots[i-1].status = data[sKey].status || "Reserved";
        }
      }
    }
    renderAdmin();
  });
}

// Render Admin UI
function renderAdmin(){
  wrap.innerHTML="";
  slots.forEach((s,i)=>{
    const d=document.createElement("div");
    d.className="card "+(s.status==="Available"?"statusAvailable":"statusReserved");
    d.innerHTML=`<div class='slotTitle'>${s.slot}</div>
      <div class='row'>
        <input value='${s.name}' class='nameInput' placeholder='Player Name'>
        <select class='statusSel'>
          <option value='Available' ${s.status==="Available"?"selected":""}>Available</option>
          <option value='Reserved' ${s.status==="Reserved"?"selected":""}>Reserved</option>
        </select>
      </div>`;
    wrap.appendChild(d);

    d.querySelector(".nameInput").oninput=e=>slots[i].name=e.target.value.toUpperCase();
    d.querySelector(".statusSel").onchange=e=>{
      slots[i].status=e.target.value;
      renderAdmin();
    }
  });
}

// Push updates
document.getElementById("pushBtn").onclick=()=>{
  const finalData={};
  slots.forEach((s,i)=>{
    finalData["Slot "+(i+1)]={slot:s.slot,name:s.name||"PLAYER",status:s.status};
  });
  db.ref("slots").set(finalData)
    .then(()=>alert("✅ Live Updated Successfully"))
    .catch(err=>alert("❌ "+err.message));
}

// Initial load
loadFromDatabase();
</script>

</body>
</html>
