<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BGMI Tournament • Register</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0C;
  --gold:#FFD700;
  --gold2:#ff9f00;
  --muted:#9aa0b4;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui;}
html,body{width:100%;height:100%;background:radial-gradient(120% 80% at 50% 0%, #121421 0%, #050508 60%, #020204 100%);color:#fff;overflow:hidden;}
.app{max-width:430px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;}

/* LIVE BAR (badge removed) */
.live-bar{
  width:100%;
  height:40px;
  background:#0b0e17;
  border-bottom:1px solid rgba(255,215,0,.4);
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
}

.live-track{
  position:absolute;
  white-space:nowrap;
  font-weight:800;
  font-size:14px;
  left:100%;
  background:linear-gradient(90deg,#FFD700,#fff,#ff9f00,#FFD700);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shine 3s linear infinite;
}

@keyframes shine{
  0%{background-position:0%}
  100%{background-position:300%}
}

.header{
  padding:14px;
  background:linear-gradient(90deg,#8a6b00,#FFD700,#fff1a8,#FFD700,#8a6b00);
  color:#000;
  font-weight:900;
  text-align:center;
}

.content{
  flex:1;
  overflow:auto;
  padding:12px 12px 90px;
}

.card{
  background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.02));
  border:1px solid rgba(255,215,0,.35);
  border-radius:22px;
  padding:16px;
  margin-bottom:14px;
}

.h{
  font-weight:900;
  color:var(--gold);
  margin-bottom:8px;
}

.sub{
  color:var(--muted);
  font-size:12px;
  margin-bottom:10px;
}

.input,.select{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid rgba(255,215,0,.35);
  background:#06070c;
  color:#fff;
  margin-bottom:10px;
  outline:none;
}

.card:first-of-type{
  position:relative;
  padding-top:40px;
}

/* ABOUT + PRIZE BUTTON */
.topBtns{
  position:absolute;
  top:14px;
  right:14px;
  display:flex;
  gap:8px;
}

.smallBtn{
  background:rgba(255,215,0,.08);
  border:1px solid rgba(255,215,0,.6);
  color:#FFD700;
  font-weight:700;
  font-size:11px;
  padding:5px 10px;
  border-radius:20px;
  cursor:pointer;
  transition:.25s ease;
}

.smallBtn:hover{
  background:rgba(255,215,0,.2);
  transform:scale(1.05);
}

.btn{
  width:100%;
  border:none;
  border-radius:16px;
  padding:14px;
  font-weight:900;
  color:#000;
  cursor:pointer;
  background:linear-gradient(90deg,var(--gold2),var(--gold),#fff1a8,var(--gold));
}

.btn.secondary{
  background:transparent;
  color:var(--gold);
  border:1px dashed rgba(255,215,0,.5);
}

.qr{
  display:none;
  margin-top:10px;
  text-align:center;
  border:1px dashed rgba(255,215,0,.5);
  border-radius:16px;
  padding:12px;
}

.qr img{
  width:180px;
  height:180px;
  border-radius:14px;
  background:#fff;
}

.ok{color:#22f5c3;font-weight:800}
.err{color:#ff6b6b;font-weight:800}

.winPop{
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%) scale(0);
  font-size:26px;
  font-weight:900;
  color:#FFD700;
  text-shadow:0 0 25px #FFD700;
  animation:pop 1.2s ease forwards;
}

@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(0);opacity:0}
  50%{transform:translate(-50%,-50%) scale(1.4);opacity:1}
  100%{transform:translate(-50%,-50%) scale(1);opacity:0}
}

.footer{
  position:sticky;
  bottom:0;
  padding:10px 12px;
  background:linear-gradient(180deg, rgba(5,6,10,.65), rgba(5,6,10,.95));
}
</style>
</head>
<body>

<div class="live-bar">
  <div class="live-track" id="liveTrack"></div>
</div>

<div class="app">
<div class="header">BGMI TOURNAMENT • REGISTER</div>
<div class="content">

<div class="card">
<div class="h">🎯 Player Details</div>

<div class="topBtns">
  <button class="smallBtn" onclick="openAbout()">About</button>
  <button class="smallBtn" onclick="openPrize()">Prize</button>
</div>

<input id="name" class="input" placeholder="Player Name"/>
<input id="bgmi" class="input" placeholder="BGMI ID"/>
<input id="phone" class="input" placeholder="Mobile No (10 digits)"/>

<select id="room" class="select">
<option value="Room 1 • 12:30 PM">Room 1 • 12:30 PM</option>
<option value="Room 2 • 8:00 PM">Room 2 • 8:00 PM</option>
</select>

<select id="amount" class="select">
<option value="20">Entry ₹20</option>
<option value="49">Entry ₹49</option>
<option value="99">Entry ₹99</option>
</select>
</div>

<div class="card">
<div class="h">💳 Payment (UPI)</div>
<div class="sub">Scan & pay selected amount</div>

<div class="qr" id="qrBox">
<img id="qrImg"/>
<input id="txn" class="input" placeholder="UPI Transaction ID"/>
</div>

<button class="btn" id="payBtn" onclick="showQR()">Pay & Continue</button>
</div>

<div class="card">
<div class="h">✅ Confirm</div>
<button class="btn secondary" onclick="confirmBooking()">Confirm Booking</button>
<div id="msg"></div>
</div>

</div>

<div class="footer">
<button class="btn" onclick="location.href='slots.html'">📋 Check Slot List</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyDsJUtZdIXcsB0w_2MQhMBXxIgbI3ijOvg",
authDomain:"incoinpaysliveearning.firebaseapp.com",
databaseURL:"https://incoinpaysliveearning-default-rtdb.firebaseio.com",
projectId:"incoinpaysliveearning"
});

let db=firebase.database();
let currentUPI="",upiLoaded=false;

firebase.auth().signInAnonymously();

db.ref("config/upi").once("value").then(snap=>{
  if(snap.exists()){ currentUPI=snap.val(); upiLoaded=true; }
});

function sanitizeInput(str){ return str.replace(/[<>\/]/g,""); }

function showQR(){
  if(!upiLoaded){ alert("Payment loading..."); return; }
  let amount=document.getElementById("amount").value;
  const qrData=encodeURIComponent(`upi://pay?pa=${currentUPI}&pn=BGMI Tournament&am=${amount}&cu=INR`);
  document.getElementById("qrImg").src=`https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${qrData}`;
  document.getElementById("qrBox").style.display="block";
  document.getElementById("payBtn").disabled=true;
}

function openAbout(){ window.location.href="about.html"; }
function openPrize(){ window.location.href="prize.html"; }

function startTicker(){
  db.ref("slots").limitToLast(1).once("value",snap=>{
    let player="Player";
    snap.forEach(child=>{ player=child.val().name; });
    let text="🎮 "+player+" joined tournament!";
    let track=document.getElementById("liveTrack");
    track.innerText=text;
    let speed=Math.max(8,text.length/2);
    track.style.transition="none";
    track.style.left="100%";
    setTimeout(()=>{ track.style.transition=`left ${speed}s linear`; track.style.left="-100%"; },100);
    setTimeout(startTicker,(speed*1000)+2000);
  });
}
startTicker();
</script>
</body>
</html>
