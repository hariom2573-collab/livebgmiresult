<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BGMI VIP PRO Mobile Overlay – Reserved Pop-Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
:root{
  --bg:#06060b;
  --vip-gradient: linear-gradient(135deg,#7b3fe4,#00f5ff,#ffd86b);
  --available-gradient: linear-gradient(135deg,#222,#444);
  --neon:#00f5ff;
  --gold:#ffd86b;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,system-ui;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}

/* Loader */
#loader{
  position:fixed;
  inset:0;
  background:rgba(6,6,11,0.95);
  z-index:9999;
  display:flex;
  justify-content:center;
  align-items:center;
}
#loader .ring{
  width:60px;height:60px;
  border:5px solid rgba(255,255,255,.15);
  border-top-color:var(--neon);
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* Marquee */
.marquee-wrap{
  position:fixed;
  top:10px;
  left:8px;
  right:8px;
  padding:6px 0;
  border-radius:14px;
  border:1px solid rgba(255,216,107,.7);
  background: linear-gradient(90deg,#7b3fe4,#00f5ff,#ffd86b);
  z-index:5;
}
.lane{height:28px;overflow:hidden;position:relative;}
.msg{
  position:absolute;right:-100%;white-space:nowrap;
  font-weight:800;font-size:13px;color:#02030a;
  text-shadow:0 1px 2px rgba(255,255,255,.5);
}
@keyframes slideRTL{from{transform:translateX(0);}to{transform:translateX(-220vw);}}

/* Info Bar */
.info-bar{
  position:fixed;
  top:56px;left:8px;right:8px;
  display:grid;grid-template-columns:1fr 1fr;
  gap:10px;padding:6px;border-radius:16px;
  z-index:5;
}
.info-left,.info-right{
  position:relative;padding:10px 12px;border-radius:14px;
  font-size:11px;color:#fff;
  border:1.5px solid rgba(0,245,255,.6);
  background:linear-gradient(135deg,rgba(123,63,228,.25),rgba(0,245,255,.15));
  backdrop-filter: blur(10px);-webkit-backdrop-filter: blur(10px);
  box-shadow:0 0 12px rgba(0,245,255,.35), inset 0 0 8px rgba(255,255,255,.15);
  overflow:hidden;
}
.info-left span{color:var(--gold);font-weight:800;text-shadow:0 0 6px rgba(255,216,107,.8);}
.info-right b{color:var(--neon);text-shadow:0 0 6px rgba(0,245,255,.9);}
.tap-link{color:var(--gold);font-weight:800;text-decoration:none;text-shadow:0 0 6px rgba(255,216,107,.8);}
.tap-link:active{opacity:.7;}

/* Slot wrap */
.slot-wrap{
  position:fixed;left:8px;right:8px;top:136px;bottom:12px;
  display:grid;grid-template-columns:1fr 1fr;
  gap:8px;overflow-y:auto;padding-bottom:12px;
}

/* Slot card */
.slot-item{
  position:relative;display:flex;flex-direction:column;
  justify-content:center;gap:2px;padding:6px 8px;border-radius:12px;
  border:2px solid rgba(255,216,107,.9);
  box-shadow:0 0 8px rgba(123,63,228,.5), inset 0 0 6px rgba(255,255,255,.2);
  background:var(--available-gradient);
  color:#fff;cursor:pointer;transition:.2s;
}
.slot-item span:first-child{font-weight:800;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.slot-item span:last-child{font-size:8px;color:#000;font-weight:bold;background:gold;padding:1px 3px;border-radius:3px;align-self:flex-end;}

/* VIP style */
.slot-item.vip{
  background:var(--vip-gradient);color:#02030a;font-weight:800;border:3px solid gold;
  box-shadow:0 0 12px rgba(255,215,0,.8), inset 0 0 8px rgba(255,255,255,.3);
}
.vip-tag{
  position:absolute;top:-8px;right:-8px;background:linear-gradient(45deg,#ffd700,#ff8c00,#ff0000,#ff8c00,#ffd700);
  color:#000;font-weight:bold;padding:3px 6px;font-size:8px;border-radius:6px;
  text-shadow:0 0 5px #fff;
  animation:shimmer 2s linear infinite alternate;pointer-events:none;
}
@keyframes shimmer{0%{background-position:0% 50%;}100%{background-position:100% 50%;}}

/* Modal */
#modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);display:none;justify-content:center;align-items:center;z-index:9999;}
#modal{background:rgba(20,20,30,.95);padding:16px;border-radius:12px;width:90%;max-width:360px;color:#fff;position:relative;box-shadow:0 0 12px #00f5ff;}
#modal h2{font-size:16px;margin-bottom:8px;}
#modal p{font-size:14px;margin:4px 0;}
#modal button{margin-top:12px;padding:8px 12px;background:var(--neon);color:#000;border:none;border-radius:8px;font-weight:800;cursor:pointer;}
#modal .close{position:absolute;top:6px;right:8px;font-size:18px;font-weight:bold;cursor:pointer;}

/* Ripple/Click effect */
.ripple{
  position:absolute;width:20px;height:20px;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,rgba(255,255,255,.9)0%,rgba(0,245,255,.6)40%,transparent 70%);
  transform:translate(-50%,-50%) scale(0);animation:ripple .6s ease-out forwards;
}
@keyframes ripple{to{transform:translate(-50%,-50%) scale(3);opacity:0;}}

/* Fire effect */
.fire{
  position:absolute;width:40px;height:40px;border-radius:50%;pointer-events:none;
  background:radial-gradient(circle,rgba(255,150,0,.8)0%,rgba(255,50,0,0.6)50%,transparent 80%);
  transform:translate(-50%,-50%) scale(0);animation:fireBurst .5s ease-out forwards;
}
@keyframes fireBurst{0%{transform:translate(-50%,-50%) scale(0);opacity:1;}100%{transform:translate(-50%,-50%) scale(3);opacity:0;}}

/* Pulse */
.vip-pulse{position:absolute;inset:0;border-radius:12px;background:rgba(255,215,0,0.25);pointer-events:none;transform:scale(0);animation:pulse .6s ease-out forwards;}
@keyframes pulse{to{transform:scale(1.5);opacity:0;}}

</style>
</head>
<body>

<div id="loader"><div class="ring"></div></div>
<div class="marquee-wrap"><div class="lane"><span id="msg" class="msg"></span></div></div>

<div class="info-bar">
  <div class="info-left">
    🕒 <span id="dateTime"></span><br>
    🎮 Match Start: <b>8:40 PM</b>
  </div>
  <div class="info-right">
    📸 Insta: <a class="tap-link" href="https://www.instagram.com/bgmi_expertleague" target="_blank">@bgmi</a><br>
    ☎️ 7970882743
  </div>
</div>

<div class="slot-wrap" id="slotWrap"></div>

<!-- Modal -->
<div id="modal-bg">
  <div id="modal">
    <span class="close" onclick="closeModal()">×</span>
    <h2 id="modalName"></h2>
    <p>Slot Number: <span id="modalSlot"></span></p>
    <p>ID: <span id="modalId"></span></p>
    <p>Pass Time: <span id="modalPassTime"></span></p>
    <p>Match Start: <span id="modalStartTime"></span></p>
    <p>WhatsApp: <a id="modalWhatsapp" href="" target="_blank"></a></p>
    <button onclick="confirmSlot()">Confirm</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDsJUtZdIXcsB0w_2MQhMBXxIgbI3ijOvg",
  authDomain: "incoinpaysliveearning.firebaseapp.com",
  databaseURL: "https://incoinpaysliveearning-default-rtdb.firebaseio.com",
  projectId: "incoinpaysliveearning",
  storageBucket: "incoinpaysliveearning.appspot.com",
  messagingSenderId: "971873814750",
  appId: "1:971873814750:web:7418c7da119e4725ed9a4f"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

const staticMessages=["🔥 Team X Jocker – ₹510 via GPay 🔥","🔥 Big Bull – ₹300 Winner 🔥","🔥 Reaper 7 – ₹90 Winner 🔥","Check your slot & upcoming match!"];
const msgEl=document.getElementById("msg");let i=0;
function showStaticMsg(){msgEl.textContent=staticMessages[i];msgEl.style.animation="none";void msgEl.offsetWidth;msgEl.style.animation="slideRTL 14s linear";i=(i+1)%staticMessages.length;setTimeout(showStaticMsg,14000);}
showStaticMsg();

function updateTime(){const now=new Date();document.getElementById("dateTime").textContent=now.toLocaleDateString("en-IN",{day:"2-digit",month:"short",year:"numeric"})+" | "+now.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"});}
updateTime();setInterval(updateTime,60000);

const wrap=document.getElementById("slotWrap");
const loader=document.getElementById("loader");

db.ref("slots").on("value",(snap)=>{
  const data = snap.val();
  wrap.innerHTML="";

  if(!data){
    loader.style.display="none";
    return;
  }

  // 🔥 Convert object to array properly
  let slotsArray = [];

  if(Array.isArray(data)){
    slotsArray = data;
  } else {
    slotsArray = Object.values(data);
  }

  // 🔥 Sort by Slot Number (Slot 1, Slot 2 ...)
  slotsArray.sort((a,b)=>{
    let numA = parseInt(a.slot.replace(/\D/g,'')) || 0;
    let numB = parseInt(b.slot.replace(/\D/g,'')) || 0;
    return numA - numB;
  });

  // 🔥 Render in correct order
  slotsArray.forEach((s)=>{
    const isVip = s.status === "Reserved";

    const d = document.createElement("div");
    d.className = "slot-item " + (isVip ? "vip" : "");

    const displayName = s.name && s.name !== "AVAILABLE"
      ? `${s.slot} – ${s.name}`
      : s.slot;

    const statusText = isVip ? "Reserved" : "Available";

    d.innerHTML = `
      <span>${displayName}</span>
      <span>${statusText}</span>
    `;

    if(isVip){
      const vipTag = document.createElement("div");
      vipTag.className = "vip-tag";
      vipTag.textContent = "🔥 Esports 🔥";
      d.appendChild(vipTag);
    }

    wrap.appendChild(d);

    d.addEventListener("click",()=>{
      if(isVip){
        document.getElementById("modalName").textContent=s.name;
        document.getElementById("modalSlot").textContent=s.slot;
        document.getElementById("modalId").textContent=s.id||"N/A";
        document.getElementById("modalPassTime").textContent=s.passTime||"N/A";
        document.getElementById("modalStartTime").textContent=s.startTime||"8:40 PM";

        const waLink=`https://wa.me/${s.whatsapp||"7970882743"}`;
        const waEl=document.getElementById("modalWhatsapp");
        waEl.href=waLink;
        waEl.textContent=s.whatsapp||"7970882743";

        document.getElementById("modal-bg").style.display="flex";
      } else {
        window.location.href="register.html";
      }
    });
  });

  loader.style.display="none";
});

function closeModal(){document.getElementById("modal-bg").style.display="none";}
function confirmSlot(){alert("Slot confirmed!");closeModal();}
</script>
</body>
</html>
